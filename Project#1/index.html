<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vampire Survivors HTML5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- 플레이 영역: 1280x720 (기존 전체 화면 크기) -->
        <div id="canvas-area">
            <canvas id="game-canvas" width="1280" height="720"></canvas>
            <!-- UI 오버레이 (메뉴 / 게임 오버) -->
            <div id="ui-layer">
                <div id="main-menu" class="screen">
                    <h1>Survive the Night</h1>
                    <p>Choose your starting weapon:</p>
                    <div class="weapon-choices">
                        <button id="btn-sniper">저격 (Sniper)</button>
                        <button id="btn-balance">샷건 (Shotgun)</button>
                        <button id="btn-bruiser">단검 (Dagger)</button>
                        <button id="btn-start-aura">방사능 (Radiation)</button>
                        <button id="btn-start-targeted">수류탄 (Grenade)</button>
                    </div>
                </div>

                <div id="levelup-screen" class="screen hidden">
                    <h2>Level Up!</h2>
                    <div class="stat-choices">
                        <button id="btn-stat-hp">Max HP +10</button>
                        <button id="btn-stat-atk">Attack Power +5</button>
                        <button id="btn-stat-def">Defense +1</button>
                        <button id="btn-stat-spd">Move Speed +15</button>
                        <button id="btn-stat-aspd">Attack Speed +0.1x</button>
                        <button id="btn-stat-zone-targeted">Zone: 수류탄 (Targeted)</button>
                        <button id="btn-stat-zone-aura">Zone: 방사능 (Aura)</button>
                        <button id="btn-stat-wpn-sniper">Weapon: 저격 (Sniper)</button>
                        <button id="btn-stat-wpn-balance">Weapon: 샷건 (Shotgun)</button>
                        <button id="btn-stat-wpn-bruiser">Weapon: 단검 (Dagger)</button>
                    </div>
                </div>

                <div id="gameover-screen" class="screen hidden">
                    <h2>Game Over</h2>
                    <p>You survived for <span id="final-time">00:00</span></p>
                    <div id="revive-prompt">
                        <p>Revive once with 50% HP?</p>
                        <button id="btn-revive">Revive</button>
                    </div>
                    <br>
                    <button id="btn-restart">Restart fully</button>
                </div>
            </div>
        </div>

        <!-- 하단 UI 영역: 별도 추가 공간 (상태창) -->
        <div id="ui-area">
            <div id="hud">
                <div class="hud-center-group">
                    <div id="level-display">Lv: 1</div>
                    <div id="hp-bar-container">
                        <div id="hp-bar-fill"></div>
                        <span id="hp-text">100 / 100</span>
                    </div>
                    <div id="exp-bar-container">
                        <div id="exp-bar-fill"></div>
                        <span id="exp-text">0 / 10</span>
                    </div>
                    <div class="stats-panel">
                        <span id="stat-atk">ATK: 10</span>
                        <span id="stat-def">DEF: 0</span>
                        <span id="stat-spd">SPD: 150</span>
                        <span id="stat-aspd">ASPD: 1.00x</span>
                    </div>
                </div>
                <div id="time-display">00:00</div>
            </div>
        </div>
    </div>

    <!-- 엔진 -->
    <script src="src/engine/Config.js"></script>
    <script src="src/engine/Input.js"></script>
    <script src="src/engine/Pool.js"></script>
    <script src="src/engine/Game.js"></script>

    <!-- 시스템 -->
    <script src="src/systems/EffectPool.js"></script>
    <script src="src/systems/Collision.js"></script>
    <script src="src/systems/WaveManager.js"></script>
    <script src="src/systems/UpgradeSystem.js"></script>

    <!-- 개체 -->
    <script src="src/entities/ZoneWeapon.js"></script>
    <script src="src/entities/Weapon.js"></script>
    <script src="src/entities/Item.js"></script>
    <script src="src/entities/Player.js"></script>
    <script src="src/entities/Enemy.js"></script>
    <script src="src/entities/Gem.js"></script>

    <!-- 메인 루프 -->
    <script src="src/main.js"></script>
</body>
</html>
