<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vampire Survivors HTML5</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- н”Ңл Ҳмқҙ мҳҒм—ӯ: 1280x720 -->
        <div id="canvas-area">
            <canvas id="game-canvas" width="1280" height="720"></canvas>
            <!-- Auto-aim мқёл””мјҖмқҙн„° (мқёкІҢмһ„ HUD) -->
            <div id="autoaim-indicator" class="hidden">
                AUTO-AIM: <span id="autoaim-status" class="on">ON</span>
                <span id="autoaim-hint">&nbsp;[Q]</span>
            </div>
            <!-- UI мҳӨлІ„л Ҳмқҙ -->
            <div id="ui-layer">
                <!-- в”Җв”Җ л©”мқё л©”лүҙ: 2лӢЁкі„ м„ нғқ в”Җв”Җ -->
                <div id="main-menu" class="screen">
                    <!-- 1лӢЁкі„: м§Ғм—… м„ нғқ -->
                    <div id="class-select-step">
                        <h1>Survive the Night</h1>
                        <p class="menu-subtitle">м§Ғм—…мқ„ м„ нғқн•ҳм„ёмҡ”</p>
                        <div class="class-choices" id="class-choices-container">
                            <!-- Game.jsк°Җ Config.CLASSESлЎң лҸҷм Ғ мғқм„ұ -->
                        </div>
                    </div>
                    <!-- 2лӢЁкі„: л¬ҙкё° м„ нғқ -->
                    <div id="weapon-select-step" class="hidden">
                        <h2 id="weapon-select-title">л¬ҙкё°лҘј м„ нғқн•ҳм„ёмҡ”</h2>
                        <div class="weapon-choices" id="weapon-choices-dynamic">
                            <!-- Game.jsк°Җ м„ нғқлҗң м§Ғм—…м—җ л”°лқј лҸҷм Ғ мғқм„ұ -->
                        </div>
                        <button id="btn-back-to-class" class="btn-back">вҶҗ м§Ғм—… м„ нғқмңјлЎң</button>
                    </div>
                </div>

                <!-- в”Җв”Җ л ҲлІЁм—… нҷ”л©ҙ в”Җв”Җ -->
                <div id="levelup-screen" class="screen hidden">
                    <h2>Level Up!</h2>
                    <div class="upgrade-container">
                        <div class="upgrade-column">
                            <h3>Stats</h3>
                            <button id="btn-stat-hp">Max HP +10</button>
                            <button id="btn-stat-atk">Attack Power +5</button>
                            <button id="btn-stat-def">Defense +1</button>
                            <button id="btn-stat-spd">Move Speed +15</button>
                            <button id="btn-stat-aspd">Attack Speed +0.1x</button>
                            <button id="btn-stat-magnet">Magnet Radius +30</button>
                            <button id="btn-stat-hpregen">HP Regen +0.1/s</button>
                        </div>
                        <div class="upgrade-column">
                            <h3>Weapons</h3>
                            <div id="weapon-upgrade-buttons">
                                <!-- UpgradeSystemмқҙ м§Ғм—…м—җ л§һлҠ” лІ„нҠјмқ„ лҸҷм Ғ мғқм„ұ -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- в”Җв”Җ кІҢмһ„ мҳӨлІ„ в”Җв”Җ -->
                <div id="gameover-screen" class="screen hidden">
                    <h2>Game Over</h2>
                    <p>You survived for <span id="final-time">00:00</span></p>
                    <div style="display: flex; flex-direction: column; align-items: center; margin-top: 10px;">
                        <div id="revive-prompt" style="text-align: center;">
                            <p style="margin-bottom: 5px; color: #f1c40f;">Revive once with 50% HP?</p>
                        </div>
                        <div style="margin-top: 15px;">
                            <button id="btn-revive">Revive</button>
                            <button id="btn-restart">Restart</button>
                        </div>
                    </div>
                </div>

                <!-- в”Җв”Җ мқјмӢңм •м§Җ в”Җв”Җ -->
                <div id="pause-screen" class="screen hidden">
                    <h2>Paused</h2>
                    <div class="upgrade-container">
                        <div class="upgrade-column">
                            <h3>Stats</h3>
                            <div id="pause-stats-list"
                                style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
                        </div>
                        <div class="upgrade-column">
                            <h3>Weapons</h3>
                            <div id="pause-weapons-list"
                                style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
                        </div>
                    </div>
                    <div style="margin-top: 30px; display: flex; gap: 20px;">
                        <button id="btn-pause-resume">Resume</button>
                        <button id="btn-pause-restart">Restart</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- н•ҳлӢЁ UI мҳҒм—ӯ -->
        <div id="ui-area">
            <div id="hud">
                <div class="hud-center-group">
                    <div id="level-display">Lv: 1</div>
                    <div id="hp-bar-container">
                        <div id="hp-bar-fill"></div>
                        <span id="hp-text">100 / 100</span>
                    </div>
                    <div id="exp-bar-container">
                        <div id="exp-bar-fill"></div>
                        <span id="exp-text">0 / 10</span>
                    </div>
                    <div class="stats-panel">
                        <span id="stat-atk">ATK: 10</span>
                        <span id="stat-def">DEF: 0</span>
                        <span id="stat-spd">SPD: 150</span>
                        <span id="stat-aspd">ASPD: 1.00x</span>
                        <span id="stat-magnet">MAG: 100</span>
                        <span id="stat-hpregen">REG: 0/s</span>
                    </div>
                </div>
                <div id="time-display">00:00</div>
            </div>
        </div>
    </div>

    <!-- м—”м§„ -->
    <script src="src/engine/Config.js"></script>
    <script src="src/engine/Input.js"></script>
    <script src="src/engine/Pool.js"></script>
    <script src="src/engine/Game.js"></script>

    <!-- мӢңмҠӨн…ң -->
    <script src="src/systems/EffectPool.js"></script>
    <script src="src/systems/Collision.js"></script>
    <script src="src/systems/WaveManager.js"></script>
    <script src="src/systems/UpgradeSystem.js"></script>

    <!-- к°ңмІҙ -->
    <script src="src/entities/Explosion.js"></script>
    <script src="src/entities/ZoneWeapon.js"></script>
    <script src="src/entities/Weapon.js"></script>
    <script src="src/entities/WizardWeapons.js"></script>
    <script src="src/entities/Projectile.js"></script>
    <script src="src/entities/SwordAura.js"></script>
    <script src="src/entities/GreatswordWeapon.js"></script>
    <script src="src/entities/Item.js"></script>
    <script src="src/entities/Player.js"></script>
    <script src="src/entities/Enemy.js"></script>
    <script src="src/entities/Gem.js"></script>

    <!-- л©”мқё лЈЁн”„ -->
    <script src="src/main.js"></script>
</body>

</html>
